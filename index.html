<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ระบบแจ้งเตือนวันหมดอายุและนัดหมาย</title>

  <!-- ===== PWA ===== -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <!-- iOS (Safari ไม่อ่าน manifest เต็มที่ ต้องใส่ meta เพิ่ม) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="แจ้งเตือนหมดอายุ" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    /* Animation สำหรับ Modal */
    .modal-backdrop { transition: opacity .2s ease; }
    .modal-panel { transition: transform .2s ease, opacity .2s ease; }
    .modal-hidden .modal-backdrop { opacity: 0; }
    .modal-hidden .modal-panel { transform: scale(.95) translateY(10px); opacity: 0; }
    /* ป้องกัน scroll พื้นหลังเวลาเปิด modal */
    body.modal-open { overflow: hidden; }
    /* Pulse สำหรับการ์ดด่วน */
    @keyframes softpulse { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,.0);} 50%{ box-shadow:0 0 0 4px rgba(239,68,68,.12);} }
    .pulse-critical { animation: softpulse 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- ===================== HEADER / DASHBOARD ===================== -->
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-2xl mx-auto px-4 py-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-2xl">🔔</span>
        <h1 class="text-lg font-semibold text-gray-800 flex-1">ระบบแจ้งเตือนวันหมดอายุ</h1>
        <!-- สำรอง / นำเข้าข้อมูล -->
        <button id="btn-export" title="สำรองข้อมูล (ดาวน์โหลด)"
          class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="สำรองข้อมูล">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3" />
          </svg>
        </button>
        <button id="btn-import" title="นำเข้าข้อมูล (จากไฟล์สำรอง)"
          class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="นำเข้าข้อมูล">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 9l5-5 5 5M12 4v12" />
          </svg>
        </button>
        <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
      </div>
      <!-- Dashboard สรุปตัวเลข -->
      <div class="grid grid-cols-3 gap-2">
        <div class="bg-red-50 border border-red-100 rounded-xl p-3 text-center">
          <div id="stat-critical" class="text-2xl font-bold text-red-600">0</div>
          <div class="text-[11px] text-red-500 font-medium mt-0.5">ด่วน / หมดอายุ</div>
        </div>
        <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-center">
          <div id="stat-warning" class="text-2xl font-bold text-amber-600">0</div>
          <div class="text-[11px] text-amber-500 font-medium mt-0.5">ใกล้หมดอายุ</div>
        </div>
        <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
          <div id="stat-safe" class="text-2xl font-bold text-emerald-600">0</div>
          <div class="text-[11px] text-emerald-500 font-medium mt-0.5">ปกติ</div>
        </div>
      </div>

      <!-- สถานะการซิงค์ข้อมูล -->
      <div id="sync-badge" class="mt-2 text-[11px] text-gray-400 flex items-center gap-1"></div>

      <!-- ค้นหา + กรองหมวดหมู่ -->
      <div class="mt-3">
        <!-- ช่องค้นหา -->
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
          </svg>
          <input id="search-input" type="text" placeholder="ค้นหาชื่อรายการ..."
            class="w-full rounded-lg border border-gray-300 pl-10 pr-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
        </div>

        <!-- ปุ่มกรองหมวดหมู่ (เลื่อนแนวนอนได้บนจอเล็ก) -->
        <div id="filter-bar" class="flex gap-2 mt-2 overflow-x-auto pb-1 -mx-1 px-1">
          <!-- ปุ่มถูก render ด้วย JS -->
        </div>
      </div>
    </div>
  </header>

  <!-- ===================== MAIN: CARD LIST ===================== -->
  <main class="max-w-2xl mx-auto px-4 py-4 pb-28">
    <!-- Loading state -->
    <div id="loading-state" class="hidden text-center py-20">
      <svg class="animate-spin w-8 h-8 text-blue-500 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.37 0 0 5.37 0 12h4z"></path>
      </svg>
      <p class="text-gray-400 text-sm mt-3">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden text-center py-16">
      <div class="text-4xl mb-2">⚠️</div>
      <p class="text-gray-600 font-medium">เชื่อมต่อฐานข้อมูลไม่สำเร็จ</p>
      <p id="error-detail" class="text-gray-400 text-sm mt-1"></p>
      <button onclick="reload()" class="mt-4 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">ลองอีกครั้ง</button>
    </div>

    <div id="card-list" class="space-y-3"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20">
      <div class="text-5xl mb-3">📭</div>
      <p class="text-gray-500 font-medium">ยังไม่มีรายการ</p>
      <p class="text-gray-400 text-sm mt-1">กดปุ่ม + มุมขวาล่างเพื่อเพิ่มรายการแรก</p>
    </div>
  </main>

  <!-- ===================== FLOATING ACTION BUTTON ===================== -->
  <button id="fab"
    class="fixed bottom-6 right-6 z-20 w-14 h-14 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white rounded-full shadow-lg shadow-blue-600/30 flex items-center justify-center transition"
    aria-label="เพิ่มรายการใหม่">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
  </button>

  <!-- ===================== MODAL ฟอร์ม ===================== -->
  <div id="modal" class="modal-hidden hidden fixed inset-0 z-30">
    <div id="modal-backdrop" class="modal-backdrop absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div class="modal-panel bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-xl">
        <div class="px-5 pt-5 pb-3 flex items-center justify-between border-b border-gray-100">
          <h2 id="modal-title" class="text-lg font-semibold">เพิ่มรายการใหม่</h2>
          <button id="modal-close" class="text-gray-400 hover:text-gray-600 p-1" aria-label="ปิด">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="item-form" class="px-5 py-4 space-y-4">
          <input type="hidden" id="item-id" />

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อรายการ</label>
            <input id="item-name" type="text" required placeholder="เช่น ต่อภาษีรถยนต์"
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
            <select id="item-category"
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
              <option value="vehicle">🚗 ยานพาหนะ</option>
              <option value="document">📄 เอกสารส่วนตัว</option>
              <option value="service">📱 บริการ / แอป</option>
              <option value="appointment">📅 นัดหมายทั่วไป</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">วันที่กำหนด</label>
            <input id="item-date" type="date" required
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>

          <!-- แจ้งเตือนซ้ำรายปี -->
          <label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input id="item-repeat" type="checkbox"
              class="mt-0.5 w-5 h-5 rounded text-blue-600 focus:ring-blue-500" />
            <span class="text-sm">
              <span class="font-medium text-gray-700">🔁 แจ้งเตือนซ้ำทุกปี</span>
              <span class="block text-xs text-gray-400 mt-0.5">เหมาะกับรายการที่ต่ออายุประจำ เช่น ภาษีรถ บัตรประชาชน — เมื่อเลยกำหนด ระบบจะเลื่อนเป็นปีถัดไปอัตโนมัติ</span>
            </span>
          </label>

          <div class="flex gap-2 pt-2">
            <button type="button" id="modal-cancel"
              class="flex-1 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50">ยกเลิก</button>
            <button type="submit"
              class="flex-1 py-2.5 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
  /* =========================================================
     CONFIG: ข้อมูลหมวดหมู่ (ไอคอน + ชื่อภาษาไทย)
     ========================================================= */
  const CATEGORIES = {
    vehicle:     { label: 'ยานพาหนะ',       icon: '🚗' },
    document:    { label: 'เอกสารส่วนตัว',   icon: '📄' },
    service:     { label: 'บริการ / แอป',    icon: '📱' },
    appointment: { label: 'นัดหมายทั่วไป',   icon: '📅' },
  };

  /* =========================================================
     ⚙️  ตั้งค่า: วาง Web app URL ของ Google Apps Script ตรงนี้
     ----------------------------------------------------------
     - ได้จากขั้นตอน Deploy > New deployment > Web app
     - หน้าตาจะเป็น: https://script.google.com/macros/s/XXXXX/exec
     - ถ้าปล่อยว่างไว้ ระบบจะ fallback ไปใช้ localStorage ให้อัตโนมัติ
       (สะดวกตอนทดสอบ UI ก่อนเชื่อม Backend จริง)
     ========================================================= */
  const GAS_URL = ''; // <-- ใส่ลิงก์ GAS ตรงนี้ (ทางเลือกเดิม)

  /* =========================================================
     ☁️  ตั้งค่า Firebase (sync ข้ามอุปกรณ์แบบเรียลไทม์)
     ----------------------------------------------------------
     วิธีได้ค่านี้: console.firebase.google.com > สร้าง project >
     เพิ่ม Web app (</>) > จะได้ object firebaseConfig มาวางทับด้านล่าง
     - ถ้า apiKey ยังว่าง ระบบจะใช้ localStorage / GAS ตามเดิม
     - ลำดับความสำคัญ: Firebase > GAS > localStorage
     ========================================================= */
  const firebaseConfig = {
    apiKey: '',
    authDomain: '',
    projectId: '',
    storageBucket: '',
    messagingSenderId: '',
    appId: '',
  };

  /* =========================================================
     DATA LAYER (Repository Pattern)
     ----------------------------------------------------------
     ทุกเมธอดคืนค่าเป็น Promise. ภายในเลือกใช้ระหว่าง FirebaseStore /
     RemoteStore (GAS) / LocalStore (localStorage) อัตโนมัติ
     ตามค่าที่ตั้งไว้ (ดูฟังก์ชัน initStore ด้านล่าง)
     ========================================================= */

  // --- โหมด localStorage (ใช้เมื่อยังไม่ได้ตั้ง GAS_URL) ---
  const LocalStore = {
    KEY: 'reminder_items_v1',
    async getAll() {
      const raw = localStorage.getItem(this.KEY);
      return raw ? JSON.parse(raw) : [];
    },
    async _saveAll(items) {
      localStorage.setItem(this.KEY, JSON.stringify(items));
    },
    async add(item) {
      const items = await this.getAll();
      item.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      item.createdAt = new Date().toISOString();
      items.push(item);
      await this._saveAll(items);
      return item;
    },
    async update(id, data) {
      const items = await this.getAll();
      const idx = items.findIndex(i => i.id === id);
      if (idx !== -1) {
        items[idx] = { ...items[idx], ...data };
        await this._saveAll(items);
      }
      return items[idx];
    },
    async remove(id) {
      let items = await this.getAll();
      items = items.filter(i => i.id !== id);
      await this._saveAll(items);
    },
  };

  // --- โหมด Google Apps Script ---
  const RemoteStore = {
    async getAll() {
      const res = await fetch(`${GAS_URL}?action=list`);
      const out = await res.json();
      if (!out.ok) throw new Error(out.error || 'โหลดข้อมูลล้มเหลว');
      return out.data;
    },
    // ส่งแบบ text/plain เพื่อเลี่ยง CORS preflight ของ GAS
    async _post(action, payload) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, payload }),
      });
      const out = await res.json();
      if (!out.ok) throw new Error(out.error || 'บันทึกข้อมูลล้มเหลว');
      return out.data;
    },
    async add(item)        { return this._post('add', item); },
    async update(id, data) { return this._post('update', { ...data, id }); },
    async remove(id)       { return this._post('delete', { id }); },
  };

  // --- โหมด Firebase (Cloud Firestore) ---
  // โหลด SDK แบบ dynamic import จาก CDN เฉพาะตอนที่ตั้งค่า firebaseConfig แล้ว
  async function createFirebaseStore() {
    const V = '10.12.0';
    const { initializeApp } = await import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`);
    const { getAuth, signInAnonymously } = await import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`);
    const { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } =
      await import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`);

    const app = initializeApp(firebaseConfig);
    await signInAnonymously(getAuth(app)); // เข้าใช้แบบ anonymous (ต้องเปิด Anonymous ใน console)
    const db = getFirestore(app);
    const col = () => collection(db, 'items');

    return {
      async getAll() {
        const snap = await getDocs(col());
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      async add(item) {
        const payload = {
          name: item.name, category: item.category, date: item.date,
          repeat: item.repeat || 'none', createdAt: new Date().toISOString(),
        };
        const ref = await addDoc(col(), payload);
        return { id: ref.id, ...payload };
      },
      async update(id, data) {
        await updateDoc(doc(db, 'items', id), {
          name: data.name, category: data.category, date: data.date, repeat: data.repeat || 'none',
        });
      },
      async remove(id) {
        await deleteDoc(doc(db, 'items', id));
      },
    };
  }

  // เลือก backend ตามการตั้งค่า (เรียกครั้งเดียวตอนเริ่มแอป)
  // ลำดับความสำคัญ: Firebase > Google Apps Script > localStorage
  let Store;
  let SYNC_MODE = 'local';
  async function initStore() {
    if (firebaseConfig && firebaseConfig.apiKey) {
      Store = await createFirebaseStore();
      SYNC_MODE = 'firebase';
    } else if (GAS_URL) {
      Store = RemoteStore;
      SYNC_MODE = 'gas';
    } else {
      Store = LocalStore;
      SYNC_MODE = 'local';
    }
  }

  /* =========================================================
     LOGIC: คำนวณสถานะจากวันที่
     ========================================================= */
  function daysLeft(dateStr) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const target = new Date(dateStr);
    target.setHours(0, 0, 0, 0);
    return Math.round((target - today) / 86400000); // ms ต่อวัน
  }

  // คืนค่าสถานะ: critical | warning | safe
  function getStatus(dateStr) {
    const d = daysLeft(dateStr);
    if (d <= 3) return 'critical';       // หมดอายุแล้ว หรือเหลือ 0-3 วัน
    if (d <= 30) return 'warning';       // เหลือ <= 30 วัน
    return 'safe';                       // มากกว่า 30 วัน
  }

  // ชุดสีตามสถานะ (ใช้กับขอบการ์ด + ป้าย Tag)
  const STATUS_STYLE = {
    critical: {
      border: 'border-l-4 border-red-500',
      tagBg: 'bg-red-100 text-red-700',
      dot: 'bg-red-500',
      extra: 'pulse-critical',
    },
    warning: {
      border: 'border-l-4 border-amber-400',
      tagBg: 'bg-amber-100 text-amber-700',
      dot: 'bg-amber-400',
      extra: '',
    },
    safe: {
      border: 'border-l-4 border-emerald-400',
      tagBg: 'bg-emerald-100 text-emerald-700',
      dot: 'bg-emerald-400',
      extra: '',
    },
  };

  // ชื่อเดือนภาษาไทยแบบย่อ
  const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  // จัด format วันที่แบบไทย + ปี พ.ศ. เช่น "24 มิ.ย. 2569"
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const dd = d.getDate();
    const month = THAI_MONTHS[d.getMonth()];
    const buddhistYear = d.getFullYear() + 543; // ค.ศ. -> พ.ศ.
    return `${dd} ${month} ${buddhistYear}`;
  }

  // ข้อความบอกจำนวนวันที่เหลือ
  function daysLeftText(dateStr) {
    const d = daysLeft(dateStr);
    if (d < 0) return `เลยกำหนดมาแล้ว ${Math.abs(d)} วัน`;
    if (d === 0) return 'ครบกำหนดวันนี้';
    if (d === 1) return 'เหลืออีก 1 วัน';
    return `เหลืออีก ${d} วัน`;
  }

  // เลื่อนวันของรายการ "ทำซ้ำทุกปี" ไปปีถัดไป จนกว่าจะถึงวันนี้/อนาคต
  function nextYearlyDate(dateStr) {
    const d = new Date(dateStr);
    while (daysLeft(d.toISOString().slice(0, 10)) < 0) {
      d.setFullYear(d.getFullYear() + 1);
    }
    return d.toISOString().slice(0, 10);
  }

  // ตรวจรายการที่ทำซ้ำทุกปีและเลยกำหนดแล้ว -> เลื่อนวันอัตโนมัติ + บันทึก
  async function rolloverRecurring() {
    const due = state.items.filter(i => i.repeat === 'yearly' && daysLeft(i.date) < 0);
    for (const item of due) {
      const newDate = nextYearlyDate(item.date);
      await Store.update(item.id, {
        name: item.name, category: item.category, date: newDate, repeat: 'yearly',
      });
      item.date = newDate; // อัปเดต cache ในหน่วยความจำด้วย
    }
  }

  /* =========================================================
     RENDER
     ========================================================= */
  const els = {
    list: document.getElementById('card-list'),
    empty: document.getElementById('empty-state'),
    loading: document.getElementById('loading-state'),
    error: document.getElementById('error-state'),
    errorDetail: document.getElementById('error-detail'),
    statCritical: document.getElementById('stat-critical'),
    statWarning: document.getElementById('stat-warning'),
    statSafe: document.getElementById('stat-safe'),
    search: document.getElementById('search-input'),
    filterBar: document.getElementById('filter-bar'),
  };

  // State กลางของแอป
  const state = {
    items: [],              // ข้อมูลทั้งหมด (cache ในหน่วยความจำ)
    search: '',             // คำค้นหา
    filter: 'all',          // หมวดหมู่ที่เลือก: all | vehicle | ...
  };

  // โหลดข้อมูลจาก backend (ยิง fetch จริงเฉพาะตอนนี้)
  async function loadData() {
    showState('loading');
    try {
      state.items = await Store.getAll();
      await rolloverRecurring(); // เลื่อนวันรายการที่ทำซ้ำทุกปีให้เป็นปัจจุบัน
      render();
    } catch (err) {
      els.errorDetail.textContent = err.message || String(err);
      showState('error');
    }
  }

  // สลับการแสดงผลระหว่าง loading / error / list
  function showState(mode) {
    els.loading.classList.toggle('hidden', mode !== 'loading');
    els.error.classList.toggle('hidden', mode !== 'error');
    els.list.classList.toggle('hidden', mode !== 'list');
  }

  // วาดผลจาก state ใน cache (ไม่ยิง fetch) — ใช้ตอนค้นหา/กรอง
  function render() {
    showState('list');

    // อัปเดต Dashboard จากข้อมูลทั้งหมด (ไม่ขึ้นกับตัวกรอง)
    let c = 0, w = 0, s = 0;
    state.items.forEach(i => {
      const st = getStatus(i.date);
      if (st === 'critical') c++;
      else if (st === 'warning') w++;
      else s++;
    });
    els.statCritical.textContent = c;
    els.statWarning.textContent = w;
    els.statSafe.textContent = s;

    // กรอง + ค้นหา
    const keyword = state.search.trim().toLowerCase();
    let items = state.items.filter(i => {
      const matchCat = state.filter === 'all' || i.category === state.filter;
      const matchKw = !keyword || (i.name || '').toLowerCase().includes(keyword);
      return matchCat && matchKw;
    });

    // เรียง: ใกล้หมดอายุที่สุดขึ้นบนสุด (วันน้อย/ติดลบ มาก่อน)
    items.sort((a, b) => daysLeft(a.date) - daysLeft(b.date));

    // Empty state (ปรับข้อความตามว่ากำลังกรองอยู่หรือไม่)
    const isFiltering = keyword || state.filter !== 'all';
    els.empty.classList.toggle('hidden', items.length > 0);
    if (items.length === 0) {
      els.empty.querySelector('p').textContent =
        isFiltering ? 'ไม่พบรายการที่ค้นหา' : 'ยังไม่มีรายการ';
    }

    els.list.innerHTML = items.map(renderCard).join('');
  }

  // วาดปุ่มกรองหมวดหมู่
  function renderFilterBar() {
    const buttons = [{ key: 'all', label: 'ทั้งหมด', icon: '📋' }]
      .concat(Object.entries(CATEGORIES).map(([key, c]) => ({ key, label: c.label, icon: c.icon })));

    els.filterBar.innerHTML = buttons.map(b => {
      const active = state.filter === b.key;
      const cls = active
        ? 'bg-blue-600 text-white border-blue-600'
        : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50';
      return `<button data-filter="${b.key}"
        class="shrink-0 whitespace-nowrap text-sm px-3 py-1.5 rounded-full border font-medium transition ${cls}">
        ${b.icon} ${b.label}</button>`;
    }).join('');
  }

  // แสดงสถานะว่าตอนนี้เก็บข้อมูลที่ไหน
  function updateSyncBadge() {
    const badge = document.getElementById('sync-badge');
    const map = {
      firebase: '☁️ ซิงค์ข้ามอุปกรณ์ (Firebase)',
      gas:      '☁️ ซิงค์ผ่าน Google Sheet',
      local:    '📱 เก็บข้อมูลในเครื่องนี้',
    };
    badge.textContent = map[SYNC_MODE] || map.local;
  }

  function renderCard(item) {
    const cat = CATEGORIES[item.category] || { label: item.category, icon: '🔖' };
    const status = getStatus(item.date);
    const style = STATUS_STYLE[status];

    return `
      <div class="bg-white rounded-xl shadow-sm ${style.border} ${style.extra} p-4 flex items-start gap-3">
        <div class="text-2xl leading-none mt-0.5">${cat.icon}</div>

        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-semibold text-gray-800 truncate">${escapeHtml(item.name)}</h3>
            <span class="shrink-0 inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full ${style.tagBg}">
              <span class="w-1.5 h-1.5 rounded-full ${style.dot}"></span>
              ${daysLeftText(item.date)}
            </span>
          </div>

          <div class="text-xs text-gray-400 mt-0.5 flex items-center gap-1.5">
            <span>${cat.label}</span>
            ${item.repeat === 'yearly'
              ? '<span class="inline-flex items-center gap-0.5 text-[10px] font-medium text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded-full">🔁 ทุกปี</span>'
              : ''}
          </div>

          <div class="flex items-center gap-1.5 mt-2 text-sm text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span>${formatDate(item.date)}</span>
          </div>
        </div>

        <div class="flex flex-col gap-1 shrink-0">
          <button onclick="editItem('${item.id}')" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="แก้ไข">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </button>
          <button onclick="deleteItem('${item.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg" aria-label="ลบ">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]
    ));
  }

  /* =========================================================
     MODAL CONTROL
     ========================================================= */
  const modal = {
    el: document.getElementById('modal'),
    title: document.getElementById('modal-title'),
    form: document.getElementById('item-form'),
    fId: document.getElementById('item-id'),
    fName: document.getElementById('item-name'),
    fCategory: document.getElementById('item-category'),
    fDate: document.getElementById('item-date'),
    fRepeat: document.getElementById('item-repeat'),

    open(item = null) {
      if (item) {
        this.title.textContent = 'แก้ไขรายการ';
        this.fId.value = item.id;
        this.fName.value = item.name;
        this.fCategory.value = item.category;
        this.fDate.value = item.date;
        this.fRepeat.checked = item.repeat === 'yearly';
      } else {
        this.title.textContent = 'เพิ่มรายการใหม่';
        this.form.reset();
        this.fId.value = '';
      }
      this.el.classList.remove('hidden');
      document.body.classList.add('modal-open');
      // ให้ transition ทำงาน (รอ 1 frame)
      requestAnimationFrame(() => this.el.classList.remove('modal-hidden'));
      setTimeout(() => this.fName.focus(), 150);
    },

    close() {
      this.el.classList.add('modal-hidden');
      document.body.classList.remove('modal-open');
      setTimeout(() => this.el.classList.add('hidden'), 200);
    },
  };

  /* =========================================================
     ACTIONS (global เพื่อให้ onclick ในการ์ดเรียกได้)
     ========================================================= */
  window.editItem = function (id) {
    const item = state.items.find(i => i.id === id);
    if (item) modal.open(item);
  };

  window.deleteItem = async function (id) {
    if (confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) {
      await Store.remove(id);
      await loadData();
    }
  };

  // ปุ่ม "ลองอีกครั้ง" ใน error state
  window.reload = loadData;

  /* =========================================================
     EVENT BINDINGS
     ========================================================= */
  document.getElementById('fab').addEventListener('click', () => modal.open());
  document.getElementById('modal-close').addEventListener('click', () => modal.close());
  document.getElementById('modal-cancel').addEventListener('click', () => modal.close());
  document.getElementById('modal-backdrop').addEventListener('click', () => modal.close());
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !modal.el.classList.contains('hidden')) modal.close();
  });

  modal.form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      name: modal.fName.value.trim(),
      category: modal.fCategory.value,
      date: modal.fDate.value,
      repeat: modal.fRepeat.checked ? 'yearly' : 'none',
    };
    if (!data.name || !data.date) return;

    const submitBtn = modal.form.querySelector('button[type="submit"]');
    const original = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'กำลังบันทึก...';
    submitBtn.classList.add('opacity-70');

    try {
      const id = modal.fId.value;
      if (id) await Store.update(id, data);
      else await Store.add(data);
      modal.close();
      await loadData();
    } catch (err) {
      alert('บันทึกไม่สำเร็จ: ' + (err.message || err));
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = original;
      submitBtn.classList.remove('opacity-70');
    }
  });

  // ค้นหา (debounce เล็กน้อยให้พิมพ์ลื่น)
  let searchTimer;
  els.search.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value;
      render();
    }, 150);
  });

  // กรองหมวดหมู่ (event delegation)
  els.filterBar.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-filter]');
    if (!btn) return;
    state.filter = btn.dataset.filter;
    renderFilterBar();
    render();
  });

  /* =========================================================
     สำรอง / นำเข้าข้อมูล (Export / Import JSON)
     ========================================================= */
  document.getElementById('btn-export').addEventListener('click', () => {
    if (state.items.length === 0) { alert('ยังไม่มีข้อมูลให้สำรอง'); return; }
    const payload = {
      app: 'expiry-reminder',
      version: 1,
      exportedAt: new Date().toISOString(),
      items: state.items.map(i => ({
        name: i.name, category: i.category, date: i.date, repeat: i.repeat || 'none',
      })),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup-reminder-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  const importFile = document.getElementById('import-file');
  document.getElementById('btn-import').addEventListener('click', () => importFile.click());
  importFile.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const parsed = JSON.parse(await file.text());
      const items = Array.isArray(parsed) ? parsed : parsed.items;
      if (!Array.isArray(items)) throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');

      const valid = items.filter(i => i && i.name && i.date);
      if (valid.length === 0) throw new Error('ไม่พบรายการที่นำเข้าได้ในไฟล์');
      if (!confirm(`พบ ${valid.length} รายการ ต้องการนำเข้า (เพิ่มต่อจากข้อมูลเดิม) ใช่หรือไม่?`)) return;

      showState('loading');
      for (const i of valid) {
        await Store.add({
          name: String(i.name),
          category: CATEGORIES[i.category] ? i.category : 'appointment',
          date: String(i.date),
          repeat: i.repeat === 'yearly' ? 'yearly' : 'none',
        });
      }
      await loadData();
      alert(`นำเข้า ${valid.length} รายการสำเร็จ`);
    } catch (err) {
      alert('นำเข้าไม่สำเร็จ: ' + (err.message || err));
      await loadData();
    } finally {
      importFile.value = ''; // เคลียร์เพื่อให้เลือกไฟล์เดิมซ้ำได้
    }
  });

  /* =========================================================
     INIT
     ========================================================= */
  (async function init() {
    renderFilterBar();

    // เลือก backend (Firebase / GAS / localStorage) ให้เสร็จก่อนใช้งาน
    showState('loading');
    try {
      await initStore();
    } catch (err) {
      els.errorDetail.textContent = 'เชื่อมต่อระบบซิงค์ไม่สำเร็จ: ' + (err.message || err);
      showState('error');
      return;
    }
    updateSyncBadge();

    // ใส่ข้อมูลตัวอย่างครั้งแรก เฉพาะโหมด localStorage เท่านั้น
    // (โหมด Firebase/GAS จะไม่ seed เพื่อไม่ให้เขียนข้อมูลตัวอย่างลงฐานข้อมูลจริง)
    if (Store === LocalStore) {
      const existing = await Store.getAll();
      if (existing.length === 0) {
        const today = new Date();
        const plus = (n) => {
          const d = new Date(today);
          d.setDate(d.getDate() + n);
          return d.toISOString().slice(0, 10);
        };
        await Store.add({ name: 'ต่อภาษีรถยนต์ ป้ายแดง', category: 'vehicle', date: plus(2), repeat: 'yearly' });
        await Store.add({ name: 'บัตรประชาชนหมดอายุ', category: 'document', date: plus(20), repeat: 'yearly' });
        await Store.add({ name: 'ต่ออายุ Netflix', category: 'service', date: plus(45), repeat: 'none' });
        await Store.add({ name: 'นัดหมอฟัน', category: 'appointment', date: plus(-1), repeat: 'none' });
      }
    }

    await loadData();
  })();

  /* =========================================================
     PWA: ลงทะเบียน Service Worker (ทำงานออฟไลน์ + ติดตั้งได้)
     หมายเหตุ: ใช้ได้เฉพาะตอนเปิดผ่าน http/https หรือ localhost
     (เปิดแบบ file:// ดับเบิลคลิก จะไม่ทำงาน — ดูวิธีรันใน README)
     ========================================================= */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker พร้อมใช้งาน:', reg.scope))
        .catch(err => console.warn('ลงทะเบียน Service Worker ไม่สำเร็จ:', err));
    });
  }
  </script>
</body>
</html>
