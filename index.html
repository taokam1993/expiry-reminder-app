<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ระบบแจ้งเตือนวันหมดอายุและนัดหมาย</title>

  <!-- ===== PWA ===== -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <!-- iOS (Safari ไม่อ่าน manifest เต็มที่ ต้องใส่ meta เพิ่ม) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="แจ้งเตือนหมดอายุ" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <!-- ใช้ธีมที่บันทึกไว้ทันที (กันจอกระพริบตอนโหลด) -->
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
    /* Animation สำหรับ Modal */
    .modal-backdrop { transition: opacity .2s ease; }
    .modal-panel { transition: transform .2s ease, opacity .2s ease; }
    .modal-hidden .modal-backdrop { opacity: 0; }
    .modal-hidden .modal-panel { transform: scale(.95) translateY(10px); opacity: 0; }
    /* ป้องกัน scroll พื้นหลังเวลาเปิด modal */
    body.modal-open { overflow: hidden; }
    /* Pulse สำหรับการ์ดด่วน */
    @keyframes softpulse { 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,.0);} 50%{ box-shadow:0 0 0 4px rgba(239,68,68,.12);} }
    .pulse-critical { animation: softpulse 2s ease-in-out infinite; }

    /* ===== โหมดมืด (Dark mode) — override สีของ utility ที่ใช้ในแอป ===== */
    html.dark body { background-color:#0f172a; }
    html.dark .bg-gray-50 { background-color:#0f172a; }
    html.dark .bg-white { background-color:#1e293b; }
    html.dark .bg-gray-100 { background-color:#334155; }
    html.dark .text-gray-800 { color:#f1f5f9; }
    html.dark .text-gray-700 { color:#e2e8f0; }
    html.dark .text-gray-600 { color:#cbd5e1; }
    html.dark .text-gray-500 { color:#94a3b8; }
    html.dark .text-gray-400 { color:#94a3b8; }
    html.dark .border-gray-300 { border-color:#475569; }
    html.dark .border-gray-200 { border-color:#334155; }
    html.dark .border-gray-100 { border-color:#334155; }
    html.dark input, html.dark select, html.dark textarea { color:#f1f5f9; }
    html.dark input::placeholder, html.dark textarea::placeholder { color:#64748b; }
    /* การ์ดสรุป (stat) ในโหมดมืด ให้เป็นโทนสีจางบนพื้นเข้ม */
    html.dark .bg-red-50 { background-color:rgba(239,68,68,.13); }
    html.dark .border-red-100 { border-color:rgba(239,68,68,.30); }
    html.dark .bg-amber-50 { background-color:rgba(245,158,11,.13); }
    html.dark .border-amber-100 { border-color:rgba(245,158,11,.30); }
    html.dark .bg-emerald-50 { background-color:rgba(16,185,129,.13); }
    html.dark .border-emerald-100 { border-color:rgba(16,185,129,.30); }
    html.dark .hover\:bg-gray-50:hover { background-color:#334155; }
    /* ป้าย tag สถานะบนการ์ด ปรับให้อ่านง่ายบนพื้นมืด */
    html.dark .bg-red-100 { background-color:rgba(239,68,68,.20); }
    html.dark .bg-amber-100 { background-color:rgba(245,158,11,.20); }
    html.dark .bg-emerald-100 { background-color:rgba(16,185,129,.20); }
    html.dark .bg-blue-50 { background-color:rgba(59,130,246,.18); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- ===================== HEADER / DASHBOARD ===================== -->
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-2xl mx-auto px-4 py-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-2xl">🔔</span>
        <h1 class="text-lg font-semibold text-gray-800 flex-1">ระบบแจ้งเตือนวันหมดอายุ</h1>
        <!-- สลับโหมดมืด/สว่าง -->
        <button id="btn-theme" title="สลับโหมดมืด/สว่าง"
          class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="สลับธีม">
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>
        <!-- สำรอง / ส่งออกข้อมูล (เมนู) -->
        <div class="relative">
          <button id="btn-export" title="ส่งออก / สำรองข้อมูล"
            class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="ส่งออกข้อมูล">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3" />
            </svg>
          </button>
          <div id="export-menu" class="hidden absolute right-0 mt-1 w-52 bg-white rounded-lg shadow-lg border border-gray-100 py-1 z-30 text-sm">
            <button id="btn-export-json" class="w-full text-left px-3 py-2 hover:bg-gray-50 text-gray-700">💾 สำรองเป็น JSON <span class="block text-xs text-gray-400">กู้คืน/นำเข้ากลับได้</span></button>
            <button id="btn-export-csv" class="w-full text-left px-3 py-2 hover:bg-gray-50 text-gray-700">📊 ส่งออก CSV <span class="block text-xs text-gray-400">เปิดใน Excel / Google ชีต</span></button>
          </div>
        </div>
        <button id="btn-import" title="นำเข้าข้อมูล (จากไฟล์สำรอง)"
          class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="นำเข้าข้อมูล">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 9l5-5 5 5M12 4v12" />
          </svg>
        </button>
        <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
      </div>
      <!-- Dashboard สรุปตัวเลข -->
      <div class="grid grid-cols-3 gap-2">
        <div class="bg-red-50 border border-red-100 rounded-xl p-3 text-center">
          <div id="stat-critical" class="text-2xl font-bold text-red-600">0</div>
          <div class="text-[11px] text-red-500 font-medium mt-0.5">ด่วน / หมดอายุ</div>
        </div>
        <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-center">
          <div id="stat-warning" class="text-2xl font-bold text-amber-600">0</div>
          <div class="text-[11px] text-amber-500 font-medium mt-0.5">ใกล้หมดอายุ</div>
        </div>
        <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
          <div id="stat-safe" class="text-2xl font-bold text-emerald-600">0</div>
          <div class="text-[11px] text-emerald-500 font-medium mt-0.5">ปกติ</div>
        </div>
      </div>

      <!-- สถานะการซิงค์ข้อมูล -->
      <div id="sync-badge" class="mt-2 text-[11px] text-gray-400 flex items-center gap-1"></div>

      <!-- ค้นหา + กรองหมวดหมู่ -->
      <div class="mt-3">
        <!-- ช่องค้นหา -->
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
          </svg>
          <input id="search-input" type="text" placeholder="ค้นหาชื่อรายการ..."
            class="w-full rounded-lg border border-gray-300 pl-10 pr-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
        </div>

        <!-- ปุ่มกรองหมวดหมู่ (เลื่อนแนวนอนได้บนจอเล็ก) -->
        <div id="filter-bar" class="flex gap-2 mt-2 overflow-x-auto pb-1 -mx-1 px-1">
          <!-- ปุ่มถูก render ด้วย JS -->
        </div>

        <!-- จัดกลุ่มการ์ด -->
        <div class="flex items-center justify-end gap-2 mt-2">
          <label for="group-select" class="text-xs text-gray-500">จัดกลุ่ม:</label>
          <select id="group-select"
            class="text-xs rounded-lg border border-gray-300 px-2 py-1 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="none">ไม่จัดกลุ่ม</option>
            <option value="status">ตามความเร่งด่วน</option>
            <option value="category">ตามหมวดหมู่</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- ===================== MAIN: CARD LIST ===================== -->
  <main class="max-w-2xl mx-auto px-4 py-4 pb-28">
    <!-- แท็บ รายการปัจจุบัน / ประวัติ -->
    <div class="flex gap-2 mb-4">
      <button data-view="active" class="view-tab flex-1 py-2 rounded-lg text-sm font-medium transition">
        📋 รายการ
      </button>
      <button data-view="history" class="view-tab flex-1 py-2 rounded-lg text-sm font-medium transition">
        ✅ ประวัติ
      </button>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="hidden text-center py-20">
      <svg class="animate-spin w-8 h-8 text-blue-500 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.37 0 0 5.37 0 12h4z"></path>
      </svg>
      <p class="text-gray-400 text-sm mt-3">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Error state -->
    <div id="error-state" class="hidden text-center py-16">
      <div class="text-4xl mb-2">⚠️</div>
      <p class="text-gray-600 font-medium">เชื่อมต่อฐานข้อมูลไม่สำเร็จ</p>
      <p id="error-detail" class="text-gray-400 text-sm mt-1"></p>
      <button onclick="reload()" class="mt-4 px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">ลองอีกครั้ง</button>
    </div>

    <div id="card-list" class="space-y-3"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20">
      <div class="text-5xl mb-3">📭</div>
      <p class="text-gray-500 font-medium">ยังไม่มีรายการ</p>
      <p class="text-gray-400 text-sm mt-1">กดปุ่ม + มุมขวาล่างเพื่อเพิ่มรายการแรก</p>
    </div>
  </main>

  <!-- ===================== FLOATING ACTION BUTTON ===================== -->
  <button id="fab"
    class="fixed bottom-6 right-6 z-20 w-14 h-14 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white rounded-full shadow-lg shadow-blue-600/30 flex items-center justify-center transition"
    aria-label="เพิ่มรายการใหม่">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
  </button>

  <!-- ===================== MODAL ฟอร์ม ===================== -->
  <div id="modal" class="modal-hidden hidden fixed inset-0 z-30">
    <div id="modal-backdrop" class="modal-backdrop absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div class="modal-panel bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-xl">
        <div class="px-5 pt-5 pb-3 flex items-center justify-between border-b border-gray-100">
          <h2 id="modal-title" class="text-lg font-semibold">เพิ่มรายการใหม่</h2>
          <button id="modal-close" class="text-gray-400 hover:text-gray-600 p-1" aria-label="ปิด">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="item-form" class="px-5 py-4 space-y-4">
          <input type="hidden" id="item-id" />

          <!-- เทมเพลตเพิ่มด่วน (แสดงเฉพาะตอนเพิ่มรายการใหม่) -->
          <div id="quick-templates-wrap">
            <label class="block text-sm font-medium text-gray-700 mb-1">⚡ เพิ่มด่วน <span class="text-gray-400 font-normal">(แตะเพื่อเติมอัตโนมัติ)</span></label>
            <div id="quick-templates" class="flex flex-wrap gap-2"></div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อรายการ</label>
            <input id="item-name" type="text" required placeholder="เช่น ต่อภาษีรถยนต์"
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
            <select id="item-category"
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
              <option value="vehicle">🚗 ยานพาหนะ</option>
              <option value="document">📄 เอกสารส่วนตัว</option>
              <option value="service">📱 บริการ / แอป</option>
              <option value="device">🔧 อุปกรณ์</option>
              <option value="appointment">📅 นัดหมายทั่วไป</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">วันที่กำหนด</label>
            <input id="item-date" type="date" required
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>

          <!-- แจ้งเตือนซ้ำรายปี -->
          <label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input id="item-repeat" type="checkbox"
              class="mt-0.5 w-5 h-5 rounded text-blue-600 focus:ring-blue-500" />
            <span class="text-sm">
              <span class="font-medium text-gray-700">🔁 แจ้งเตือนซ้ำทุกปี</span>
              <span class="block text-xs text-gray-400 mt-0.5">เหมาะกับรายการที่ต่ออายุประจำ เช่น ภาษีรถ บัตรประชาชน — เมื่อเลยกำหนด ระบบจะเลื่อนเป็นปีถัดไปอัตโนมัติ</span>
            </span>
          </label>

          <!-- โน้ต / รายละเอียดเพิ่มเติม -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">โน้ต / รายละเอียด <span class="text-gray-400 font-normal">(ไม่บังคับ)</span></label>
            <textarea id="item-note" rows="2" placeholder="เช่น เลขทะเบียน, สถานที่นัด, หมายเหตุ..."
              class="w-full rounded-lg border border-gray-300 px-3 py-2.5 resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
          </div>

          <!-- แนบรูป -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">รูปภาพ <span class="text-gray-400 font-normal">(ไม่บังคับ เช่น รูปเอกสาร)</span></label>
            <input id="item-image-file" type="file" accept="image/*" class="hidden" />
            <div id="image-empty">
              <button type="button" id="btn-pick-image"
                class="w-full flex items-center justify-center gap-2 py-3 rounded-lg border-2 border-dashed border-gray-300 text-gray-500 hover:bg-gray-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="text-sm">เลือก / ถ่ายรูป</span>
              </button>
            </div>
            <div id="image-preview-wrap" class="hidden relative">
              <img id="image-preview" class="w-full max-h-48 object-cover rounded-lg border border-gray-200" alt="ตัวอย่างรูป" />
              <button type="button" id="btn-remove-image"
                class="absolute top-2 right-2 bg-black/60 text-white rounded-full p-1.5 hover:bg-black/80" aria-label="ลบรูป">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>

          <div class="flex gap-2 pt-2">
            <button type="button" id="modal-cancel"
              class="flex-1 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50">ยกเลิก</button>
            <button type="submit"
              class="flex-1 py-2.5 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700">บันทึก</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===================== LIGHTBOX (ดูรูปเต็มจอ) ===================== -->
  <div id="lightbox" class="hidden fixed inset-0 z-40 bg-black/90 flex items-center justify-center p-4" aria-label="ดูรูป">
    <img id="lightbox-img" class="max-w-full max-h-full rounded-lg" alt="รูปเต็ม" />
    <button id="lightbox-close" class="absolute top-4 right-4 text-white bg-white/10 hover:bg-white/20 rounded-full p-2" aria-label="ปิด">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <script>
  /* =========================================================
     CONFIG: ข้อมูลหมวดหมู่ (ไอคอน + ชื่อภาษาไทย)
     ========================================================= */
  const CATEGORIES = {
    vehicle:     { label: 'ยานพาหนะ',       icon: '🚗' },
    document:    { label: 'เอกสารส่วนตัว',   icon: '📄' },
    service:     { label: 'บริการ / แอป',    icon: '📱' },
    device:      { label: 'อุปกรณ์',         icon: '🔧' },
    appointment: { label: 'นัดหมายทั่วไป',   icon: '📅' },
  };

  /* =========================================================

  const firebaseConfig = {

  /* =========================================================
     DATA LAYER (Repository Pattern)
     ----------------------------------------------------------
     ทุกเมธอดคืนค่าเป็น Promise. ภายในเลือกใช้ระหว่าง FirebaseStore /
     RemoteStore (GAS) / LocalStore (localStorage) อัตโนมัติ
     ตามค่าที่ตั้งไว้ (ดูฟังก์ชัน initStore ด้านล่าง)
     ========================================================= */

  // --- โหมด localStorage (ใช้เมื่อยังไม่ได้ตั้ง GAS_URL) ---
  const LocalStore = {
    KEY: 'reminder_items_v1',
    async getAll() {
      const raw = localStorage.getItem(this.KEY);
      return raw ? JSON.parse(raw) : [];
    },
    async _saveAll(items) {
      localStorage.setItem(this.KEY, JSON.stringify(items));
    },
    async add(item) {
      const items = await this.getAll();
      item.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      item.createdAt = new Date().toISOString();
      items.push(item);
      await this._saveAll(items);
      return item;
    },
    async update(id, data) {
      const items = await this.getAll();
      const idx = items.findIndex(i => i.id === id);
      if (idx !== -1) {
        items[idx] = { ...items[idx], ...data };
        await this._saveAll(items);
      }
      return items[idx];
    },
    async remove(id) {
      let items = await this.getAll();
      items = items.filter(i => i.id !== id);
      await this._saveAll(items);
    },
  };

  // --- โหมด Google Apps Script ---
  const RemoteStore = {
    async getAll() {
      const res = await fetch(`${GAS_URL}?action=list`);
      const out = await res.json();
      if (!out.ok) throw new Error(out.error || 'โหลดข้อมูลล้มเหลว');
      return out.data;
    },
    // ส่งแบบ text/plain เพื่อเลี่ยง CORS preflight ของ GAS
    async _post(action, payload) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, payload }),
      });
      const out = await res.json();
      if (!out.ok) throw new Error(out.error || 'บันทึกข้อมูลล้มเหลว');
      return out.data;
    },
    async add(item)        { return this._post('add', item); },
    async update(id, data) { return this._post('update', { ...data, id }); },
    async remove(id)       { return this._post('delete', { id }); },
  };

  // --- โหมด Firebase (Cloud Firestore) ---
  // โหลด SDK แบบ dynamic import จาก CDN เฉพาะตอนที่ตั้งค่า firebaseConfig แล้ว
  async function createFirebaseStore() {
    const V = '10.12.0';
    const { initializeApp } = await import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`);
    const { getAuth, signInAnonymously } = await import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`);
    const { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } =
      await import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`);

    const app = initializeApp(firebaseConfig);
    await signInAnonymously(getAuth(app)); // เข้าใช้แบบ anonymous (ต้องเปิด Anonymous ใน console)
    const db = getFirestore(app);
    const col = () => collection(db, 'items');

    return {
      async getAll() {
        const snap = await getDocs(col());
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      async add(item) {
        const payload = {
          name: item.name, category: item.category, date: item.date,
          repeat: item.repeat || 'none', note: item.note || '', image: item.image || '',
          done: item.done || false, doneAt: item.doneAt || '',
          createdAt: new Date().toISOString(),
        };
        const ref = await addDoc(col(), payload);
        return { id: ref.id, ...payload };
      },
      async update(id, data) {
        // อัปเดตเฉพาะ field ที่ส่งมา (รองรับการอัปเดตบางส่วน เช่น mark as done)
        const allowed = ['name','category','date','repeat','note','image','done','doneAt'];
        const payload = {};
        allowed.forEach(k => { if (data[k] !== undefined) payload[k] = data[k]; });
        await updateDoc(doc(db, 'items', id), payload);
      },
      async remove(id) {
        await deleteDoc(doc(db, 'items', id));
      },
    };
  }

  // เลือก backend ตามการตั้งค่า (เรียกครั้งเดียวตอนเริ่มแอป)
  // ลำดับความสำคัญ: Firebase > Google Apps Script > localStorage
  let Store;
  let SYNC_MODE = 'local';
  async function initStore() {
    if (firebaseConfig && firebaseConfig.apiKey) {
      Store = await createFirebaseStore();
      SYNC_MODE = 'firebase';
    } else if (GAS_URL) {
      Store = RemoteStore;
      SYNC_MODE = 'gas';
    } else {
      Store = LocalStore;
      SYNC_MODE = 'local';
    }
  }

  /* =========================================================
     LOGIC: คำนวณสถานะจากวันที่
     ========================================================= */
  function daysLeft(dateStr) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const target = new Date(dateStr);
    target.setHours(0, 0, 0, 0);
    return Math.round((target - today) / 86400000); // ms ต่อวัน
  }

  // คืนค่าสถานะ: critical | warning | safe
  function getStatus(dateStr) {
    const d = daysLeft(dateStr);
    if (d <= 3) return 'critical';       // หมดอายุแล้ว หรือเหลือ 0-3 วัน
    if (d <= 30) return 'warning';       // เหลือ <= 30 วัน
    return 'safe';                       // มากกว่า 30 วัน
  }

  // ชุดสีตามสถานะ (ใช้กับขอบการ์ด + ป้าย Tag)
  const STATUS_STYLE = {
    critical: {
      border: 'border-l-4 border-red-500',
      tagBg: 'bg-red-100 text-red-700',
      dot: 'bg-red-500',
      extra: 'pulse-critical',
    },
    warning: {
      border: 'border-l-4 border-amber-400',
      tagBg: 'bg-amber-100 text-amber-700',
      dot: 'bg-amber-400',
      extra: '',
    },
    safe: {
      border: 'border-l-4 border-emerald-400',
      tagBg: 'bg-emerald-100 text-emerald-700',
      dot: 'bg-emerald-400',
      extra: '',
    },
  };

  // ชื่อเดือนภาษาไทยแบบย่อ
  const THAI_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  // จัด format วันที่แบบไทย + ปี พ.ศ. เช่น "24 มิ.ย. 2569"
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const dd = d.getDate();
    const month = THAI_MONTHS[d.getMonth()];
    const buddhistYear = d.getFullYear() + 543; // ค.ศ. -> พ.ศ.
    return `${dd} ${month} ${buddhistYear}`;
  }

  // ข้อความบอกจำนวนวันที่เหลือ
  function daysLeftText(dateStr) {
    const d = daysLeft(dateStr);
    if (d < 0) return `เลยกำหนดมาแล้ว ${Math.abs(d)} วัน`;
    if (d === 0) return 'ครบกำหนดวันนี้';
    if (d === 1) return 'เหลืออีก 1 วัน';
    return `เหลืออีก ${d} วัน`;
  }

  // บวกปีให้วันที่ (คืน YYYY-MM-DD)
  function addYears(dateStr, n) {
    const d = new Date(dateStr);
    d.setFullYear(d.getFullYear() + n);
    return d.toISOString().slice(0, 10);
  }

  // เลื่อนวันของรายการ "ทำซ้ำทุกปี" ไปปีถัดไป จนกว่าจะถึงวันนี้/อนาคต
  function nextYearlyDate(dateStr) {
    let s = dateStr;
    while (daysLeft(s) < 0) s = addYears(s, 1);
    return s;
  }

  // ตรวจรายการที่ทำซ้ำทุกปีและเลยกำหนดแล้ว -> เลื่อนวันอัตโนมัติ + บันทึก
  // (ข้ามรายการที่ทำเสร็จแล้ว/อยู่ในประวัติ)
  async function rolloverRecurring() {
    const due = state.items.filter(i => i.repeat === 'yearly' && !i.done && daysLeft(i.date) < 0);
    for (const item of due) {
      const newDate = nextYearlyDate(item.date);
      await Store.update(item.id, {
        name: item.name, category: item.category, date: newDate, repeat: 'yearly',
      });
      item.date = newDate; // อัปเดต cache ในหน่วยความจำด้วย
    }
  }

  /* =========================================================
     RENDER
     ========================================================= */
  const els = {
    list: document.getElementById('card-list'),
    empty: document.getElementById('empty-state'),
    loading: document.getElementById('loading-state'),
    error: document.getElementById('error-state'),
    errorDetail: document.getElementById('error-detail'),
    statCritical: document.getElementById('stat-critical'),
    statWarning: document.getElementById('stat-warning'),
    statSafe: document.getElementById('stat-safe'),
    search: document.getElementById('search-input'),
    filterBar: document.getElementById('filter-bar'),
    group: document.getElementById('group-select'),
    viewTabs: document.querySelectorAll('.view-tab'),
  };

  // State กลางของแอป
  const state = {
    items: [],              // ข้อมูลทั้งหมด (cache ในหน่วยความจำ)
    search: '',             // คำค้นหา
    filter: 'all',          // หมวดหมู่ที่เลือก: all | vehicle | ...
    group: 'none',          // การจัดกลุ่ม: none | status | category
    view: 'active',         // มุมมอง: active (รายการ) | history (ประวัติ)
  };

  // โหลดข้อมูลจาก backend (ยิง fetch จริงเฉพาะตอนนี้)
  async function loadData() {
    showState('loading');
    try {
      state.items = await Store.getAll();
      await rolloverRecurring(); // เลื่อนวันรายการที่ทำซ้ำทุกปีให้เป็นปัจจุบัน
      render();
    } catch (err) {
      els.errorDetail.textContent = err.message || String(err);
      showState('error');
    }
  }

  // สลับการแสดงผลระหว่าง loading / error / list
  function showState(mode) {
    els.loading.classList.toggle('hidden', mode !== 'loading');
    els.error.classList.toggle('hidden', mode !== 'error');
    els.list.classList.toggle('hidden', mode !== 'list');
  }

  // วาดผลจาก state ใน cache (ไม่ยิง fetch) — ใช้ตอนค้นหา/กรอง
  function render() {
    showState('list');
    renderViewTabs();

    const isHistory = state.view === 'history';

    // อัปเดต Dashboard จากรายการที่ยัง active เท่านั้น (ไม่นับที่ทำเสร็จแล้ว)
    let c = 0, w = 0, s = 0;
    state.items.filter(i => !i.done).forEach(i => {
      const st = getStatus(i.date);
      if (st === 'critical') c++;
      else if (st === 'warning') w++;
      else s++;
    });
    els.statCritical.textContent = c;
    els.statWarning.textContent = w;
    els.statSafe.textContent = s;

    // กรองตามมุมมอง (active/history) + หมวดหมู่ + คำค้น (ชื่อ/โน้ต)
    const keyword = state.search.trim().toLowerCase();
    let items = state.items.filter(i => {
      const matchView = isHistory ? i.done : !i.done;
      const matchCat = state.filter === 'all' || i.category === state.filter;
      const matchKw = !keyword ||
        (i.name || '').toLowerCase().includes(keyword) ||
        (i.note || '').toLowerCase().includes(keyword);
      return matchView && matchCat && matchKw;
    });

    // เรียง: ประวัติ -> ทำเสร็จล่าสุดก่อน, ปกติ -> ใกล้หมดอายุที่สุดก่อน
    if (isHistory) items.sort((a, b) => (b.doneAt || '').localeCompare(a.doneAt || ''));
    else items.sort((a, b) => daysLeft(a.date) - daysLeft(b.date));

    // Empty state
    const isFiltering = keyword || state.filter !== 'all';
    els.empty.classList.toggle('hidden', items.length > 0);
    if (items.length === 0) {
      els.empty.querySelector('p').textContent = isHistory
        ? (isFiltering ? 'ไม่พบในประวัติ' : 'ยังไม่มีประวัติที่ทำเสร็จ')
        : (isFiltering ? 'ไม่พบรายการที่ค้นหา' : 'ยังไม่มีรายการ');
    }

    // วาดผล: ประวัติไม่จัดกลุ่ม / รายการปกติจัดกลุ่มได้
    if (isHistory || state.group === 'none' || items.length === 0) {
      els.list.innerHTML = items.map(renderCard).join('');
    } else {
      els.list.innerHTML = groupItems(items).map(g => `
        <div class="pt-1">
          <div class="flex items-center gap-2 mb-2 px-1">
            <span class="text-sm font-semibold text-gray-600">${g.label}</span>
            <span class="text-xs text-gray-400">(${g.items.length})</span>
            <span class="flex-1 border-t border-gray-200"></span>
          </div>
          <div class="space-y-3">${g.items.map(renderCard).join('')}</div>
        </div>
      `).join('');
    }
  }

  // ปรับสไตล์แท็บ รายการ/ประวัติ ให้ตรงกับ state.view
  function renderViewTabs() {
    els.viewTabs.forEach(tab => {
      const active = tab.dataset.view === state.view;
      tab.className = 'view-tab flex-1 py-2 rounded-lg text-sm font-medium transition ' +
        (active ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-50');
    });
  }

  // จัดกลุ่มรายการตาม state.group -> [{label, items}]
  function groupItems(items) {
    if (state.group === 'status') {
      const buckets = { critical: [], warning: [], safe: [] };
      items.forEach(i => buckets[getStatus(i.date)].push(i));
      return [
        { key: 'critical', label: '🔴 ด่วน / หมดอายุ', items: buckets.critical },
        { key: 'warning',  label: '🟡 ใกล้หมดอายุ',    items: buckets.warning },
        { key: 'safe',     label: '🟢 ปกติ',           items: buckets.safe },
      ].filter(g => g.items.length > 0);
    }
    // group === 'category'
    return Object.entries(CATEGORIES).map(([key, c]) => ({
      key, label: `${c.icon} ${c.label}`, items: items.filter(i => i.category === key),
    })).filter(g => g.items.length > 0);
  }

  // วาดปุ่มกรองหมวดหมู่
  function renderFilterBar() {
    const buttons = [{ key: 'all', label: 'ทั้งหมด', icon: '📋' }]
      .concat(Object.entries(CATEGORIES).map(([key, c]) => ({ key, label: c.label, icon: c.icon })));

    els.filterBar.innerHTML = buttons.map(b => {
      const active = state.filter === b.key;
      const cls = active
        ? 'bg-blue-600 text-white border-blue-600'
        : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50';
      return `<button data-filter="${b.key}"
        class="shrink-0 whitespace-nowrap text-sm px-3 py-1.5 rounded-full border font-medium transition ${cls}">
        ${b.icon} ${b.label}</button>`;
    }).join('');
  }

  // แสดงสถานะว่าตอนนี้เก็บข้อมูลที่ไหน
  function updateSyncBadge() {
    const badge = document.getElementById('sync-badge');
    const map = {
      firebase: '☁️ ซิงค์ข้ามอุปกรณ์ (Firebase)',
      gas:      '☁️ ซิงค์ผ่าน Google Sheet',
      local:    '📱 เก็บข้อมูลในเครื่องนี้',
    };
    badge.textContent = map[SYNC_MODE] || map.local;
  }

  function renderCard(item) {
    const cat = CATEGORIES[item.category] || { label: item.category, icon: '🔖' };
    const isDone = !!item.done;
    const status = getStatus(item.date);
    const style = STATUS_STYLE[status];
    // รายการในประวัติใช้โทนเทา ไม่ไฮไลต์สีสถานะ
    const border = isDone ? 'border-l-4 border-gray-300' : `${style.border} ${style.extra}`;

    // ป้ายมุมขวา: ประวัติ -> เสร็จเมื่อ, ปกติ -> วันคงเหลือ
    const tag = isDone
      ? `<span class="shrink-0 inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">
           ✓ เสร็จ ${item.doneAt ? formatDate(item.doneAt) : ''}
         </span>`
      : `<span class="shrink-0 inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full ${style.tagBg}">
           <span class="w-1.5 h-1.5 rounded-full ${style.dot}"></span>${daysLeftText(item.date)}
         </span>`;

    // ปุ่มจัดการ: ประวัติ -> กู้คืน + ลบ, ปกติ -> ทำเสร็จ + แก้ไข + ลบ
    const actions = isDone
      ? `<button onclick="restoreItem('${item.id}')" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" aria-label="กู้คืน" title="กู้คืนเป็นรายการ">
           <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h11a4 4 0 010 8h-1M3 10l4-4M3 10l4 4" /></svg>
         </button>
         <button onclick="deleteItem('${item.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg" aria-label="ลบ">
           <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>

  /* =========================================================
     แนบรูป: เลือกไฟล์ -> ย่อขนาด + บีบอัดเป็น data URL (เก็บใน DB ได้เลย)

  // ย่อรูปด้วย canvas ให้ด้านยาวสุดไม่เกิน maxSize px แล้ว export เป็น JPEG
  function compressImage(file, maxSize, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('ไฟล์รูปไม่ถูกต้อง'));
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxSize) { height = Math.round(height * maxSize / width); width = maxSize; }
          else if (height > maxSize) { width = Math.round(width * maxSize / height); height = maxSize; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  const exportMenu = document.getElementById('export-menu');

  // ดาวน์โหลดไฟล์ทั่วไป
  function downloadFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  // สำรองเป็น JSON (นำเข้ากลับได้ครบ รวมรูป)
  document.getElementById('btn-export-json').addEventListener('click', () => {
    if (state.items.length === 0) { alert('ยังไม่มีข้อมูลให้สำรอง'); return; }
    const payload = {
      app: 'expiry-reminder',
      version: 2,
      exportedAt: new Date().toISOString(),
      items: state.items.map(i => ({
        name: i.name, category: i.category, date: i.date, repeat: i.repeat || 'none',
        note: i.note || '', image: i.image || '', done: !!i.done, doneAt: i.doneAt || '',
      })),
    };
    downloadFile(JSON.stringify(payload, null, 2),
      `backup-reminder-${new Date().toISOString().slice(0, 10)}.json`, 'application/json');
  });

  // ส่งออก CSV (เปิดใน Excel / Google ชีต) — ไม่รวมรูปเพราะใหญ่เกินไป
  document.getElementById('btn-export-csv').addEventListener('click', () => {
    if (state.items.length === 0) { alert('ยังไม่มีข้อมูลให้ส่งออก'); return; }
    const esc = (v) => {
      const s = String(v == null ? '' : v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const headers = ['ชื่อรายการ', 'หมวดหมู่', 'วันที่กำหนด', 'ทำซ้ำทุกปี', 'จำนวนวันคงเหลือ', 'สถานะ', 'โน้ต'];
    const rows = state.items.map(i => {
      const cat = (CATEGORIES[i.category] || {}).label || i.category;
      const repeat = i.repeat === 'yearly' ? 'ใช่' : 'ไม่';
      const status = i.done ? `เสร็จแล้ว (${i.doneAt || ''})` : daysLeftText(i.date);
      const left = i.done ? '' : daysLeft(i.date);
      return [i.name, cat, formatDate(i.date), repeat, left, status, i.note || ''].map(esc).join(',');
    });
    // ใส่ BOM (U+FEFF) เพื่อให้ Excel อ่านภาษาไทยถูก
    const BOM = String.fromCharCode(0xFEFF);
    const csv = BOM + [headers.join(','), ...rows].join('\r\n');
    downloadFile(csv, `reminder-${new Date().toISOString().slice(0, 10)}.csv`, 'text/csv;charset=utf-8');

  (async function init() {

    showState('loading');
    try {
      await initStore();
    } catch (err) {
      els.errorDetail.textContent = 'เชื่อมต่อระบบซิงค์ไม่สำเร็จ: ' + (err.message || err);
      showState('error');
      return;
    }
    updateSyncBadge();

    // ใส่ข้อมูลตัวอย่างครั้งแรก เฉพาะโหมด localStorage เท่านั้น
    // (โหมด Firebase/GAS จะไม่ seed เพื่อไม่ให้เขียนข้อมูลตัวอย่างลงฐานข้อมูลจริง)
    if (Store === LocalStore) {
      const existing = await Store.getAll();
      if (existing.length === 0) {
        const today = new Date();
        const plus = (n) => {
          const d = new Date(today);
          d.setDate(d.getDate() + n);
          return d.toISOString().slice(0, 10);
        };
        await Store.add({ name: 'ต่อภาษีรถยนต์ ป้ายแดง', category: 'vehicle', date: plus(2), repeat: 'yearly' });
        await Store.add({ name: 'บัตรประชาชนหมดอายุ', category: 'document', date: plus(20), repeat: 'yearly' });
        await Store.add({ name: 'ต่ออายุ Netflix', category: 'service', date: plus(45), repeat: 'none' });
        await Store.add({ name: 'นัดหมอฟัน', category: 'appointment', date: plus(-1), repeat: 'none' });
      }
    }

    await loadData();
  })();

  /* =========================================================
     PWA: ลงทะเบียน Service Worker (ทำงานออฟไลน์ + ติดตั้งได้)
     หมายเหตุ: ใช้ได้เฉพาะตอนเปิดผ่าน http/https หรือ localhost
     (เปิดแบบ file:// ดับเบิลคลิก จะไม่ทำงาน — ดูวิธีรันใน README)
     ========================================================= */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker พร้อมใช้งาน:', reg.scope))
        .catch(err => console.warn('ลงทะเบียน Service Worker ไม่สำเร็จ:', err));
    });
  }
  </script>
